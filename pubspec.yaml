name: json_lens
description: >-
  Kotlin-like precision for JSON deserialization errors in Dart.
  Get exact JSON paths, expected vs actual types, and values instead of
  the unhelpful 'type int is not a subtype of type String'.
version: 0.0.1
homepage: https://github.com/Kingsley-EZE/json_lens
repository: https://github.com/Kingsley-EZE/json_lens
issue_tracker: https://github.com/Kingsley-EZE/json_lens/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0
